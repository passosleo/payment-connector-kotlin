services:
  postgres:
    image: postgres:16-alpine
    container_name: payment-connector-postgres
    environment:
      POSTGRES_DB: payment_connector
      POSTGRES_USER: payment_connector
      POSTGRES_PASSWORD: payment_connector
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ecommerce-api:
    image: wiremock/wiremock:latest
    container_name: payment-connector-ecommerce-api
    command:
      - "--global-response-templating"
      - "--verbose"
    ports:
      - "8090:8080"
    volumes:
      - ./integrations/wiremock/ecommerce:/home/wiremock:ro

  payment-gateway:
    image: stripe/stripe-mock:latest
    container_name: payment-connector-stripe-mock
    ports:
      - "12111:12111"
      - "12112:12112"

volumes:
  postgres_data:
